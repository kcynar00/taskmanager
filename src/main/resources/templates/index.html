<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskMngr</title>
</head>
<body>
    <h1>Mój Task Manager</h1>

    <form action="/add" method="post">
        <input type="text" name="description" placeholder="Co jest do zrobienia?" required>
        
        <select name="userId" th:if="${currentUser.role == 'ADMIN' or currentUser.role == 'MANAGER'}">
            <option value="">-- Wybierz pracownika --</option>
            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}"></option>
        </select>
        
        <button type="submit">Dodaj zadanie</button>
    </form>

    <hr>

    <ul>
        <li th:each="task : ${tasks}" style="margin-bottom: 10px;">
            
            <span th:if="${task.creator != null and task.creator.id != currentUser.id}" 
                  style="color: red; font-weight: bold; margin-right: 5px;">
                [Zlecone przez: <span th:text="${task.creator.username}"></span>]
            </span>

            <span th:text="${task.description}" 
                  th:style="${task.completed} ? 'text-decoration: line-through; color: gray;' : ''">
            </span>

            <strong th:if="${task.assignedUser != null}" 
                    th:text="' (Przypisane do: ' + ${task.assignedUser.username} + ')'"
                    th:style="${task.completed} ? 'color: gray;' : 'color: blue;'">
            </strong>

            <form th:action="@{/toggle/{id}(id=${task.id})}" method="post" style="display:inline; margin-left: 10px;">
                <button type="submit" th:text="${task.completed} ? 'Cofnij' : 'Zrobione'"></button>
            </form>

            <form th:if="${currentUser.role == 'ADMIN' or currentUser.role == 'MANAGER' or (task.creator != null and task.creator.id == currentUser.id)}" 
                  th:action="@{/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
                <button type="submit">Usuń</button>
            </form>
            
        </li>
    </ul>
</body>
</html>
